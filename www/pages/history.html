<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transaction History</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="header">

<h1>Transaction History</h1>

<p>View all your transactions</p>

</div>

<div class="container fade-in">

<div class="card">

<input
id="search"
type="text"
placeholder="Search transaction..."
onkeyup="searchTransaction()">

</div>

<div class="section">

<div class="title">
Recent Transactions
</div>

<div id="historyList">

<div class="transaction">

<div>

<div class="transaction-name">
Loading...
</div>

<div class="transaction-date">
Please wait
</div>

</div>

<div class="credit">
₦0.00
</div>

</div>

</div>

</div>
</div>

</div>

<div class="bottom-nav">

<a href="dashboard.html">
🏠
<span>Home</span>
</a>

<a href="transfer.html">
💸
<span>Transfer</span>
</a>

<a href="history.html" class="active">
📜
<span>History</span>
</a>

<a href="profile.html">
👤
<span>Profile</span>
</a>

</div>

<script>

const API_URL = "http://localhost:5000/api";

const currentUser = JSON.parse(localStorage.getItem("user"));

if(!currentUser){
location.href="login.html";
}

let transactions = [];

async function loadHistory(){

try{

const response = await fetch(
`${API_URL}/transaction/history/${currentUser.accountNumber}`
);

const data = await response.json();

if(!response.ok){

document.getElementById("historyList").innerHTML =
"<p>No transaction found.</p>";

return;

}

transactions = data.transactions || data;

renderTransactions(transactions);

}catch(e){

document.getElementById("historyList").innerHTML =
"<p>Unable to load transactions.</p>";

}

}

function renderTransactions(list){

const history = document.getElementById("historyList");

history.innerHTML = "";

if(list.length===0){

history.innerHTML="<p>No transactions found.</p>";
return;

}

list.forEach(tx=>{

history.innerHTML += `

<div class="transaction">

<div>

<div class="transaction-name">

${tx.receiverName || tx.receiverAccount || "Transaction"}

</div>

<div class="transaction-date">

${new Date(tx.createdAt).toLocaleString()}

</div>

</div>

<div class="${tx.type==="credit"?"credit":"debit"}">

₦${Number(tx.amount).toLocaleString()}

</div>

</div>

`;

});

}

function searchTransaction(){

const keyword =
document.getElementById("search").value.toLowerCase();

const filtered =
transactions.filter(tx=>

(tx.receiverName||"").toLowerCase().includes(keyword) ||

(tx.receiverAccount||"").includes(keyword)

);

renderTransactions(filtered);

}

loadHistory();

</script>

</body>
</html>
