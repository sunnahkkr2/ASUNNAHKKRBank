<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="header">

<h1>My Profile</h1>

<p>Manage your account</p>

</div>

<div class="container fade-in">

<div class="card" style="text-align:center;">

<div class="avatar">
👤
</div>

<h2 id="fullName">
Loading...
</h2>

<p id="accountNumber">
Loading...
</p>

</div>

<div class="profile-card">

<div class="transaction">

<div>

<div class="transaction-name">
Email
</div>

<div
class="transaction-date"
id="email">
Loading...
</div>

</div>

</div>

<div class="transaction">

<div>

<div class="transaction-name">
Account Balance
</div>

<div
class="transaction-date"
id="balance">
₦0.00
</div>

</div>

</div>

</div>

<div class="profile-card">

<button onclick="location.href='change-pin.html'">
Change PIN
</button>

<button onclick="location.href='change-password.html'">
Change Password
</button>

<button class="red" onclick="logout()">
Logout
</button>

</div>
</div>

<div class="bottom-nav">

<a href="dashboard.html">
🏠
<span>Home</span>
</a>

<a href="transfer.html">
💸
<span>Transfer</span>
</a>

<a href="history.html">
📜
<span>History</span>
</a>

<a href="profile.html" class="active">
👤
<span>Profile</span>
</a>

</div>

<script>

const API_URL="http://localhost:5000/api";

const currentUser=JSON.parse(localStorage.getItem("user"));

if(!currentUser){

location.href="login.html";

}

document.getElementById("fullName").innerText=
currentUser.fullName;

document.getElementById("accountNumber").innerText=
currentUser.accountNumber;

document.getElementById("email").innerText=
currentUser.email;

async function loadBalance(){

try{

const response=await fetch(
`${API_URL}/user/balance/${currentUser.accountNumber}`
);

const data=await response.json();

if(response.ok){

document.getElementById("balance").innerText=
"₦"+Number(data.balance).toLocaleString();

}

}catch(e){

console.log(e);

}

}

function logout(){

localStorage.removeItem("user");

location

}

loadBalance();

</script>

</body>
</html>
