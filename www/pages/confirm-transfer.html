<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirm Transfer</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="header">

<h1>Confirm Transfer</h1>

<p>Please review before sending</p>

</div>

<div class="container fade-in">

<div class="card">

<div class="title">
Transfer Details
</div>

<div class="transaction">

<div>

<div class="transaction-name">
Recipient
</div>

<div
class="transaction-date"
id="receiverName">
-
</div>

</div>

</div>

<div class="transaction">

<div>

<div class="transaction-name">
Account Number
</div>

<div
class="transaction-date"
id="receiverAccount">
-
</div>

</div>

</div>

<div class="transaction">

<div>

<div class="transaction-name">
Amount
</div>

<div
class="transaction-date"
id="amount">
₦0.00
</div>

</div>

</div>

<div class="transaction">

<div>

<div class="transaction-name">
Narration
</div>

<div
class="transaction-date"
id="description">
-
</div>

</div>

</div>
<button class="green" onclick="confirmTransfer()">
Confirm Transfer
</button>

<button class="red" onclick="location.href='transfer.html'">
Cancel
</button>

</div>

</div>

<script>

const API_URL="http://localhost:5000/api";

const currentUser=JSON.parse(localStorage.getItem("user"));

const transfer=JSON.parse(localStorage.getItem("pendingTransfer"));

if(!currentUser||!transfer){

location.href="transfer.html";

}

document.getElementById("receiverName").innerText=
transfer.receiverName;

document.getElementById("receiverAccount").innerText=
transfer.receiverAccount;

document.getElementById("amount").innerText=
"₦"+Number(transfer.amount).toLocaleString();

document.getElementById("description").innerText=
transfer.description||"-";

async function confirmTransfer(){

try{

const response=await fetch(`${API_URL}/transaction/transfer`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

senderAccount:currentUser.accountNumber,

receiverAccount:transfer.receiverAccount,

amount:transfer.amount,

description:transfer.description,

pin:transfer.pin

})

});

const data=await response.json();

if(!response.ok){

alert(data.message);
return;

}

localStorage.setItem(
"lastTransaction",
JSON.stringify(data.transaction)
);

localStorage.removeItem("pendingTransfer");

location.href="receipt.html";

}catch(e){

alert("Unable to connect to server.");

}

}

</script>

</body>
</html>
