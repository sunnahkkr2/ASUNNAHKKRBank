<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transfer Money</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="header">

<h1>Transfer Money</h1>

<p>Send money securely</p>

</div>

<div class="container fade-in">

<div class="card">

<label>Recipient Account Number</label>

<input
id="receiverAccount"
type="text"
placeholder="Enter account number"
onkeyup="lookupAccount()">

<div
id="receiverName"
style="
margin-top:10px;
font-weight:bold;
color:#00A651;
">
</div>

<label>Amount</label>

<input
id="amount"
type="number"
placeholder="0.00">

<label>Description</label>

<input
id="description"
placeholder="Payment description">

<label>Transfer PIN</label>

<input
id="pin"
type="password"
maxlength="4"
placeholder="****">

<button
class="green"
onclick="transferMoney()">

Continue

</button>

</div>

</div>

<script src="../js/transfer.js"></script>

</body>
</html>
