<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - ASUNNAHKKR BANK</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f7fb;
}
.header{
    background:#0066cc;
    color:#fff;
    padding:20px;
    border-bottom-left-radius:20px;
    border-bottom-right-radius:20px;
}
.card{
    background:#fff;
    margin:20px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
}
.balance{
    font-size:30px;
    font-weight:bold;
    color:#0066cc;
}
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin:20px;
}
.btn{
    background:#0066cc;
    color:white;
    padding:18px;
    text-align:center;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">

<div style="display:flex;justify-content:space-between;align-items:center;">

<div>
<h2>Welcome</h2>
<h3 id="name"></h3>
</div>

<div style="
width:55px;
height:55px;
background:white;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
color:#0066cc;
font-weight:bold;
">
👤
</div>

</div>

</div>

<div class="card">
<p>Account Number</p>
<h2 id="account"></h2>

<p>Available Balance</p>
<div style="display:flex;align-items:center;justify-content:space-between;">

<div class="balance" id="balance">
₦0.00
</div>

<button
id="toggleBalance"
style="border:none;background:none;font-size:22px;cursor:pointer;">
👁️
</button>

</div>

<div class="grid">

<a href="transfer.html" class="item">
<div class="icon">💸</div>
Transfer
</a>

<a href="airtime.html" class="item">
<div class="icon">📱</div>
Airtime
</a>

<a href="data.html" class="item">
<div class="icon">📶</div>
Data
</a>

<a href="bills.html" class="item">
<div class="icon">💡</div>
Bills
</a>

<a href="history.html" class="item">
<div class="icon">📜</div>
History
</a>

<a href="profile.html" class="item">
<div class="icon">👤</div>
Profile
</a>

</div>

<script>
const API_URL = "http://localhost:5000/api";
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    window.location.href = "login.html";
}

document.getElementById("name").innerText = user.fullName;
document.getElementById("account").innerText = user.accountNumber;

async function loadBalance() {
    try {
        const response = await fetch(
            `${API_URL}/user/balance/${user.accountNumber}`
        );

        const data = await response.json();

        if (response.ok) {
            document.getElementById("balance").innerText =
                "₦" + Number(data.balance).toLocaleString();
        }
    } catch (error) {
        console.log(error);
    }
}

loadBalance();
let visible = true;

document.getElementById("toggleBalance").onclick = function(){

if(visible){

document.getElementById("balance").innerText="••••••";

this.innerHTML="🙈";

}else{

loadBalance();

this.innerHTML="👁️";

}

visible=!visible;

};
</script>
</script>

<div class="bottom-nav">

<a href="dashboard.html" class="active">
🏠
<span>Home</span>
</a>

<a href="transfer.html">
💸
<span>Transfer</span>
</a>

<a href="history.html">
📜
<span>History</span>
</a>

<a href="profile.html">
👤
<span>Profile</span>
</a>

</div>

</body>
</html>
</body>
</html>
