<script>

const API_URL="http://localhost:5000/api";

const user=JSON.parse(localStorage.getItem("user"));

if(!user){

location.href="login.html";

}

document.getElementById("name").innerText=user.fullName;
document.getElementById("account").innerText=user.accountNumber;

let balanceVisible=true;
let realBalance=0;

async function loadBalance(){

try{

const response=await fetch(
`${API_URL}/user/balance/${user.accountNumber}`
);

const data=await response.json();

if(response.ok){

realBalance=data.balance;

document.getElementById("balance").innerText=
"₦"+Number(realBalance).toLocaleString();

}

}catch(e){

console.log(e);

}

}

document.getElementById("toggleBalance").onclick=function(){

const balance=document.getElementById("balance");

if(balanceVisible){

balance.innerText="••••••";

this.innerHTML="🙈";

}else{

balance.innerText="₦"+Number(realBalance).toLocaleString();

this.innerHTML="👁️";

}

balanceVisible=!balanceVisible;

};

loadBalance();

</script>
