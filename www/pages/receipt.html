<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transaction Receipt</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="header">

<div class="success">

<div class="success-icon">
✅
</div>

<h1>Transfer Successful</h1>

<p>Your transaction was completed successfully.</p>

</div>

</div>

<div class="container fade-in">

<div class="card">

<div class="balance"
id="amount">

₦0.00

</div>

<div class="transaction">

<div>

<div class="transaction-name">
Recipient
</div>

<div
class="transaction-date"
id="receiverName">

-

</div>

</div>

</div>

<div class="transaction">

<div>

<div class="transaction-name">
Account Number
</div>

<div
class="transaction-date"
id="receiverAccount">

-

</div>

</div>

</div>

<div class="transaction">

<div>

<div class="transaction-name">
Description
</div>

<div
class="transaction-date"
id="description">

-

</div>

</div>

</div>

<div class="transaction">

<div>

<div class="transaction-name">
Transaction ID
</div>

<div
class="transaction-date"
id="transactionId">

-

</div>

</div>

</div>

<div class="transaction">

<div>

<div class="transaction-name">
Date & Time
</div>

<div
class="transaction-date"
id="date">

-

</div>

</div>

</div>
<button class="green" onclick="location.href='dashboard.html'">
Back to Dashboard
</button>

<button onclick="window.print()">
Share / Print Receipt
</button>

</div>

</div>

<script>

const transaction =
JSON.parse(localStorage.getItem("lastTransaction"));

if(!transaction){

location.href="dashboard.html";

}

document.getElementById("amount").innerText =
"₦" + Number(transaction.amount).toLocaleString();

document.getElementById("receiverName").innerText =
transaction.receiverName ||
transaction.receiver ||
"-";

document.getElementById("receiverAccount").innerText =
transaction.receiverAccount ||
"-";

document.getElementById("description").innerText =
transaction.description ||
"No description";

document.getElementById("transactionId").innerText =
transaction._id ||
transaction.id ||
"TXN" + Date.now();

document.getElementById("date").innerText =
new Date(transaction.createdAt || Date.now()).toLocaleString();

</script>

</body>
</html>
